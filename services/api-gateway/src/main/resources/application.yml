server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: samato-api-gateway
  main:
    web-application-type: reactive     # Gateway requires WebFlux
  cloud:
    gateway:
      discovery:
        locator:
          # Don't auto-create routes from every Eureka service. We define
          # them explicitly in GatewayRoutesConfig — easier to read and to
          # control (auth, rate limit, etc.).
          enabled: false
      # Default filter: forward correlationId, add a request id, retry once.
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            exposedHeaders: "X-Correlation-Id"

# Tell Spring Cloud where Eureka is so we can resolve `lb://SERVICE` routes.
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate: { enabled: true }
    readinessstate: { enabled: true }
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
    com.samato: DEBUG
