server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://samato-postgres:5432/order_service
    username: fd
    password: fd
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://samato-auth-service:9000/.well-known/jwks.json
  kafka:
    bootstrap-servers: samato-kafka:9092
    producer:
      acks: all
      properties:
        enable.idempotence: true

eureka:
  client:
    service-url:
      defaultZone: http://samato-discovery:8761/eureka/

samato:
  outbox:
    poll-ms: 500
  saga:
    poll-ms: 1000
  resilience4j:
    restaurant-client:
      circuit-breaker:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      retry:
        max-attempts: 3
        wait-duration: 200ms

management:
  tracing:
    sampling:
      probability: 1.0
