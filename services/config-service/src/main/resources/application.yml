server:
  port: 8888
  shutdown: graceful

spring:
  application:
    name: samato-config-service
  profiles:
    active: native
  cloud:
    config:
      server:
        # Use the local config-repo/ folder for the bible. In production
        # this points at a Git URL like https://github.com/myorg/config.
        native:
          search-locations: file:./config-repo
        git:
          uri: file:./config-repo
          default-label: main
          # Force the server to pull on every request — fine for dev, expensive in prod
          force-pull: true

  # Persist nothing — config server is stateless
  datasource:
    url: jdbc:postgresql://localhost:5432/config
    username: fd
    password: fd
  jpa:
    hibernate:
      ddl-auto: none

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0   # 100% in dev; lower in prod

# Tracing → Zipkin
management.zipkin.tracing.endpoint: http://localhost:9411/api/v2/spans
spring.zipkin.discovery-client-enabled: false

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"
  level:
    org.springframework.cloud.config: INFO
    com.samato: DEBUG
