server:
  port: 8082
  shutdown: graceful

spring:
  application:
    name: samato-restaurant-service
  cloud:
    config:
      enabled: false   # for local dev; flip on when config-service is up
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_service
    username: fd
    password: fd
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # JWT
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/.well-known/jwks.json

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1s

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    properties:
      schema.registry.url: http://localhost:8085
    producer:
      acks: all
      properties:
        enable.idempotence: true
        compression.type: lz4
    consumer:
      group-id: samato-restaurant-service
      auto-offset-reset: earliest
      properties:
        specific.avro.reader: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"
  level:
    com.samato: DEBUG
