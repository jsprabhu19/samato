spring:
  application:
    name: samato-payment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    config:
      enabled: false   # for local dev; flip on when config-service is up
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/payment_service}
    username: ${POSTGRES_USER:fd}
    password: ${POSTGRES_PASSWORD:fd}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWKS_URI:http://localhost:9000/.well-known/jwks.json}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        compression.type: lz4

server:
  port: 8084
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true

# Razorpay configuration.
# - key_id / key_secret: from the Razorpay dashboard (https://dashboard.razorpay.com/app/keys).
#   Use TEST mode keys for development — they look like rzp_test_xxxxxxxx.
# - webhook_secret: set when you configure a webhook in the dashboard.
#   Razorpay signs every webhook with HMAC SHA-256 of the body using this secret.
razorpay:
  key_id:        ${RAZORPAY_KEY_ID:rzp_test_xxxxxxxxxxxxxx}
  key_secret:    ${RAZORPAY_KEY_SECRET:placeholder_secret_xxxxxxxxxxxxxx}
  webhook_secret: ${RAZORPAY_WEBHOOK_SECRET:placeholder_webhook_secret_xxxxxxxx}

samato:
  outbox:
    poll-ms: 500
  snapshot:
    every-n-events: 50
  resilience4j:
    razorpay-client:
      circuit-breaker:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 10
        minimum-number-of-calls: 5
      retry:
        max-attempts: 3
        wait-duration: 200ms

logging:
  level:
    root: INFO
    com.samato.paymentservice: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [traceId=%X{traceId:-} spanId=%X{spanId:-}] %logger{36} - %msg%n"
